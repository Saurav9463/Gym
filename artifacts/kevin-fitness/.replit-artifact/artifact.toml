kind = "web"
previewPath = "/"
title = "Kevin Fitness"
version = "1.0.0"
id = "artifacts/kevin-fitness"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24274

[services.development]
run = "pnpm --filter @workspace/kevin-fitness run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kevin-fitness", "run", "build" ]
publicDir = "artifacts/kevin-fitness/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24274"
BASE_PATH = "/"
